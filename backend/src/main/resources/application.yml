server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: nexusblog

  # MySQL 数据库配置 (请在项目根目录的 .env 文件中配置 DB_URL, DB_USERNAME, DB_PASSWORD)
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # 连接池大小
      minimum-idle: 5
      maximum-pool-size: 20
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接超时时间（毫秒）
      idle-timeout: 600000
      # 连接最大生存时间（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1

  # MyBatis-Plus 配置
  mybatis-plus:
    # Mapper XML 文件位置
    mapper-locations: classpath*:/mapper/**/*.xml
    # 实体类包路径
    type-aliases-package: com.nexusblog.entity
    # 配置
    configuration:
      # 下划线转驼峰
      map-underscore-to-camel-case: true
      # 日志实现
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 全局配置
    global-config:
      db-config:
        # 主键类型（AUTO为数据库自增）
        id-type: AUTO
        # 逻辑删除字段名
        logic-delete-field: deleted
        # 逻辑删除值（已删除）
        logic-delete-value: 1
        # 逻辑未删除值（未删除）
        logic-not-delete-value: 0

logging:
  level:
    root: INFO
    com.nexusblog: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG

nexusblog:
  security:
    session-timeout: 3600
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  encrypt:
    secret-key: nexusblog@2024#$%
