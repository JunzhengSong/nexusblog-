version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: nexusblog-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/nexusblog;MODE=MySQL;DB_CLOSE_DELAY=-1
    networks:
      - nexusblog-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: nexusblog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nexusblog-network

volumes:
  data:

networks:
  nexusblog-network:
    driver: bridge
